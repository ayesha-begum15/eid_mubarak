<!DOCTYPE html>
<html>
<head>
    <title>EID MYBARAK!</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">
<style>
    :root {
        --primary-gold: #d4af37;
        --secondary-gold: #f1c40f;
        --deep-purple: #1e0533;
        --midnight: #0a0e14;
        --glow: rgba(241, 196, 15, 0.6);
    }

    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, var(--midnight) 0%, var(--deep-purple) 100%);
        overflow: hidden;
        height: 100vh;
        width: 100vw;
        /* Setting the primary font to Amiri */
        font-family: 'Amiri', serif;
    }

    #stars-container {
        position: relative;
        width: 100%;
        height: 100%;
    }

    /* Message Overlay */
    .message-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 85%;
        max-width: 650px;
        z-index: 10;
        color: white;
        text-shadow: 0 0 10px rgba(0,0,0,0.5);
        direction: rtl; /* Right-to-left for Arabic text */
    }

    .wish-title {
        font-size: 4rem;
        color: var(--secondary-gold);
        margin-bottom: 10px;
        filter: drop-shadow(0 0 15px var(--glow));
        animation: fadeIn 3s ease-in;
    }

    .quote {
        font-size: 1.5rem;
        line-height: 1.8;
        margin: 25px 0;
        border-top: 1px solid var(--primary-gold);
        border-bottom: 1px solid var(--primary-gold);
        padding: 25px;
        background: rgba(30, 5, 51, 0.5);
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .signature {
        font-size: 1.3rem;
        color: var(--primary-gold);
        margin-top: 25px;
        letter-spacing: 1px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Original Moon and Star animations remain the same */
    .moon {
        position: absolute;
        top: 10%;
        right: 15%;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        box-shadow: 18px 18px 0 0 var(--secondary-gold);
        filter: drop-shadow(0 0 15px var(--glow));
        animation: moonFloat 8s infinite ease-in-out, moonGlow 4s infinite alternate;
        z-index: 2;
    }
    @keyframes moonFloat { 0%, 100% { transform: translate(0, 0) rotate(-5deg); } 33% { transform: translate(-10px, 15px) rotate(0deg); } 66% { transform: translate(10px, -10px) rotate(5deg); } }
    @keyframes moonGlow { from { filter: drop-shadow(0 0 10px var(--glow)); } to { filter: drop-shadow(0 0 30px var(--secondary-gold)); } }
    .shooting-star { position: absolute; width: 100px; height: 2px; background: linear-gradient(90deg, white, transparent); filter: drop-shadow(0 0 6px white); opacity: 0; z-index: 1; animation: shoot 3s ease-out forwards; }
    @keyframes shoot { 0% { transform: translateX(0) rotate(-35deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateX(-600px) rotate(-35deg); opacity: 0; } }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--speed) infinite ease-in-out; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 10px white; } }
</style>
</head>
<body>

<div id="stars-container">
    <div class="moon"></div>
    
    <div class="message-container">
        <!-- "Ramadan Mubarak" in Arabic -->
        <h1 class="wish-title">رمضان مبارك</h1> 
        
        <div class="quote">
           "رمضان صرف جسم کے لیے روزہ نہیں ہے، بلکہ صبر اور تقویٰ کے ساتھ روح کی پرورش بھی ہے۔" <br>
            <small style="font-size: 0.9rem; color: #ccc; display: block; margin-top: 10px; font-style: italic;">
                (Ramadan is not just fasting of the body; it is food for the soul with patience and piety.)
            </small>
        </div>

        <div class="signature">
            مع كل الحب، <br>
            <strong>عائشہ بیگم</strong>
        </div>
    </div>
</div>

<script>
    const container = document.getElementById('stars-container');
    for (let i = 0; i < 120; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = (Math.random() * 2 + 1) + 'px';
        star.style.width = size;
        star.style.height = size;
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.background = Math.random() > 0.8 ? '#f1c40f' : 'white';
        star.style.setProperty('--speed', (Math.random() * 3 + 2) + 's');
        container.appendChild(star);
    }
    function createShootingStar() {
        const sStar = document.createElement('div');
        sStar.className = 'shooting-star';
        sStar.style.left = (Math.random() * 50 + 50) + '%';
        sStar.style.top = (Math.random() * 40) + '%';
        container.appendChild(sStar);
        setTimeout(() => { sStar.remove(); }, 3000);
    }
    function launch() {
        createShootingStar();
        setTimeout(launch, Math.random() * 4000 + 2000);
    }
    launch();
</script>

</body>
</html>
